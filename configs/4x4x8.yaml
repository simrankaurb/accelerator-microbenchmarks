global:
  system: "ironwood"
  warmup_tries: 2
  num_runs: 5
  dtype: "float32"
  xprof_timing: true

benchmarks:
  # Collective communication demonstration
  - name: all_reduce_sum
    mesh_shape: "4x4x8"
    sharding_strategy: "1x1x8"
    sweep:
      matrix_dim: {start: 2, end: 8192, multiplier: 2}

  - name: all_gather
    mesh_shape: "4x4x8"
    sharding_strategy: "1x1x8"
    sweep:
      matrix_dim: {start: 2, end: 8192, multiplier: 2}

  - name: all_to_all
    mesh_shape: "4x4x8"
    sharding_strategy: "1x1x8"
    sweep:
      matrix_dim: {start: 2, end: 8192, multiplier: 2}

  - name: reduce_scatter
    mesh_shape: "4x4x8"
    sharding_strategy: "1x1x8"
    sweep:
      matrix_dim: {start: 2, end: 8192, multiplier: 2}
